<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        n = parseInt(prompt("Enter size: "));
        arr = [];
        max = 0;
        for(i=0;i<n;i++){
            arr[i] = parseInt(prompt("Enter Element: "));
            if(max < arr[i]){
                max = arr[i];
            }
        }
        document.write("Maximum No.: "+max);
    </script>
</body>
</html>
