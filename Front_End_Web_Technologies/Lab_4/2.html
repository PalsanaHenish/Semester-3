<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        n = parseInt(prompt("Enter a no.: "));
        
        for(i=1; i<=n; i++){
            c = 0;
            for(j=2; j<=i/2; j++){
                if(i%j == 0){
                    c++;
                    break;
                }
            }
            if(c == 0){
                document.write(i+"<br>");
            }
        }
    </script>
</body>
</html>
