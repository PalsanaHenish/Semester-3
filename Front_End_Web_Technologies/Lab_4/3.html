<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        n = parseInt(prompt("Enter a no.: "));

        for(i=1; i<=n; i++){
            for(j=1; j<=i; j++){
                document.write('*');
            }
            document.write("<br/>");
        }

        for(i=n; i>0; i--){
            for(j=i; j>0; j--){
                document.write(j+" ");
            }
            document.write("<br/>");
        }

        t = 1;
        for(i=1; i<=n; i++){
            for(j=1; j<=i; j++){
                document.write(t+" ");
                if(t == 0)t = 1;
                else t = 0;
            }
            document.write("<br/>");
        }
    </script>
</body>
</html>
