<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        s = prompt("Enter a String: ");
        c = prompt("Enter a character from string.").charAt(0);
        f = s.indexOf(c);
        l = s.lastIndexOf(c);
        document.write(s.substring(f+1,l));
    </script>
</body>
</html>
