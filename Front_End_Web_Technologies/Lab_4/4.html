<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        a = parseInt(prompt("Enter a no. a: "));
        b = parseInt(prompt("Enter a no. b: "));
        min = (a>b)?b:a;
        max = 0;

        for(i=1; i<=min; i++){
            if(a%i==0 && b%i==0){
                if(max < i){
                    max = i;
                }
            }
        }

        document.write("GCD: "+max);
    </script>
</body>
</html>
