<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = parseInt(prompt("Enter a no.: "));
        let ans = 1;
        if(n == 0 || n == 1);
        else{
            for(let i = n; i>0; i--){
                ans = ans * i;
            }
        }

        alert("Factorial: " + ans);
        document.write(ans);
        console.log(ans);
    </script>
</body>
</html>
