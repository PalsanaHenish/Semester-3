<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = parseInt(prompt("Enter a no.: "));
        let a = 0;
        let b = 1;
        let sum = 0;

        for(let i=0; i<n; i++){
            document.write(sum + " ");
            a = b;
            b = sum;
            sum = a + b;
        }
    </script>
</body>
</html>
